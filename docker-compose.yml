# docker-compose.yml — smpos-nix kernel containers with CPU caps.
#
# The kernel runs single-CPU (QEMU raspi4b exposes 4 cores but cores 1-3 are
# parked in WFI), so each container is capped at ONE host core. Override per
# invocation with DEV_CPUS / PROD_CPUS, e.g. `DEV_CPUS=4 docker compose run --rm build`
# for a faster parallel compile.
#
# Dev image = toolchain + QEMU; the source tree is bind-mounted at /src, so
# editing kernel code never rebuilds the image — just re-run a service.
#
#   docker compose build                 # build the dev image once (downloads toolchain)
#   docker compose run --rm build        # make
#   docker compose run --rm test         # make + boot on QEMU raspi4b (timed)
#   docker compose run --rm run          # interactive QEMU (the OS terminal; Ctrl-A X to quit)
#   docker compose run --rm shell        # bash inside the container
#
# Production browser screen (kernel baked in, ttyd default :7681):
#   ./prod.sh up                         # http://localhost:7681
#   docker compose logs -f prod
#   docker compose down

name: smpos-nix

# Shared dev-container definition (anchor reused by each command service).
x-dev: &dev
  image: ${DARCYOS_IMAGE:-codejedi-ai/cs452rotos-platform:latest}
  pull_policy: missing
  cpus: "${DEV_CPUS:-1}"      # <-- container CPU cap (one host core by default)
  working_dir: /src
  volumes:
    - .:/src
    - nix-disk:/disk           # persistent OS filesystem mount
  environment:
    - DISK_ROOT=/disk
    - XDIR=/opt/toolchain
    - PATH=/opt/toolchain/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  init: true

services:
  # Interactive bash in the container.
  shell:
    <<: *dev
    stdin_open: true
    tty: true
    command: ["bash"]

  # Build the kernel (make).
  build:
    <<: *dev
    command: ["make"]

  # Build + boot on QEMU raspi4b with a timeout (CI-friendly).
  test:
    <<: *dev
    command: ["bash", "-c", "make && bash docker-test.sh"]

  # Build + boot interactively — this is the OS serial terminal.
  run:
    <<: *dev
    stdin_open: true
    tty: true
    command: ["bash", "docker-run.sh"]

  # Dev screen: ttyd web terminal -> OS console (no React frontend).
  # Bind-mounts source so kernel changes take effect immediately (make on start).
  # Each browser tab spawns its own QEMU (console over TCP + Marklin via vhw.py).
  #   docker compose up screen           # http://localhost:7681
  screen:
    <<: *dev
    cpus: "${SCREEN_CPUS:-2}"
    command: ["bash", "-c", "make && exec bash display-screen/bridge/ttyd-serve.sh"]
    ports:
      - "${TTYD_PORT:-7681}:7681"
    restart: unless-stopped

  # Production browser screen: kernel baked into the image, ttyd on :7681.
  #   ./prod.sh up                       # http://localhost:7681
  prod:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        DEV_IMAGE: codejedi-ai/cs452rotos-platform:latest
    image: smpos-nix-prod
    cpus: "${PROD_CPUS:-2}"
    volumes:
      - nix-disk:/disk
    environment:
      - DISK_ROOT=/disk
    ports:
      - "${PROD_PORT:-7681}:7681"
    restart: unless-stopped

volumes:
  nix-disk:          # survives container restarts; wiped only by `docker volume rm`
